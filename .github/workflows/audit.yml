name: Audit
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir web install --frozen-lockfile
      - run: npm run audit:ts
